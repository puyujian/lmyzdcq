name: lazycat-auto-rebooter

services:
  lazycat-auto-rebooter:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lazycat-auto-rebooter
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8080}:8080"
    shm_size: "1gb"
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      APP_HOST: ${APP_HOST:-0.0.0.0}
      APP_PORT: ${APP_PORT:-8080}
      API_TOKEN: ${API_TOKEN:-change-me}
      LAZYCAT_BASE_URL: ${LAZYCAT_BASE_URL:-https://lxc.lazycat.wiki}
      LAZYCAT_LOGIN_PATH: ${LAZYCAT_LOGIN_PATH:-/login}
      LAZYCAT_CLIENTAREA_PATH: ${LAZYCAT_CLIENTAREA_PATH:-/clientarea}
      LAZYCAT_EMAIL: ${LAZYCAT_EMAIL:-}
      LAZYCAT_PASSWORD: ${LAZYCAT_PASSWORD:-}
      LAZYCAT_TARGET_HOSTNAME: ${LAZYCAT_TARGET_HOSTNAME:-}
      RESTART_COOLDOWN_SECONDS: ${RESTART_COOLDOWN_SECONDS:-300}
      STOP_WAIT_SECONDS: ${STOP_WAIT_SECONDS:-5}
      BROWSER_TIMEOUT_MS: ${BROWSER_TIMEOUT_MS:-30000}
      PLAYWRIGHT_HEADLESS: ${PLAYWRIGHT_HEADLESS:-true}
      STORAGE_STATE_PATH: ${STORAGE_STATE_PATH:-/data/storage-state.json}
      ARTIFACT_DIR: ${ARTIFACT_DIR:-/data/artifacts}
      LAZYCAT_ENTER_PANEL_TEXTS: ${LAZYCAT_ENTER_PANEL_TEXTS:-进入面板,控制面板,进入控制台,Panel,Manage Panel}
      LAZYCAT_STOP_BUTTON_TEXTS: ${LAZYCAT_STOP_BUTTON_TEXTS:-停止,关机,Shutdown,Stop,Power Off}
      LAZYCAT_START_BUTTON_TEXTS: ${LAZYCAT_START_BUTTON_TEXTS:-启动,开机,Start,Power On,Boot}
      LAZYCAT_CONFIRM_BUTTON_TEXTS: ${LAZYCAT_CONFIRM_BUTTON_TEXTS:-确认,确定,继续,Yes,Confirm,Submit}
      LAZYCAT_SERVICE_LINK_SELECTORS: ${LAZYCAT_SERVICE_LINK_SELECTORS:-}
      LAZYCAT_ENTER_PANEL_SELECTORS: ${LAZYCAT_ENTER_PANEL_SELECTORS:-}
      LAZYCAT_STOP_BUTTON_SELECTORS: ${LAZYCAT_STOP_BUTTON_SELECTORS:-}
      LAZYCAT_START_BUTTON_SELECTORS: ${LAZYCAT_START_BUTTON_SELECTORS:-}
      LAZYCAT_CONFIRM_BUTTON_SELECTORS: ${LAZYCAT_CONFIRM_BUTTON_SELECTORS:-}
    volumes:
      - ./data:/data
